<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineData - Αποσύνδεση</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #101010; 
            color: white; 
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-box {
            background-color: rgba(33, 37, 41, 0.95); 
            padding: 3rem;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none !important;
            backdrop-filter: blur(10px);
            max-width: 600px;
            color: white;
        }
        .brand-name {
            font-size:2rem;
            font-weight: 700;
            color: #ffc107;
            margin-bottom: 1.5rem;
        }
        .btn-blue {
            background-color: #ffc107;
            color: black;
            border-radius: 5px;
            padding: 10px 25px;
            text-decoration: none;
            margin-right: 10px;
        }
        .btn-outline {
            border: 1px solid #ccc;
            color: #666;
            border-radius: 5px;
            padding: 10px 25px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="logout-box shadow">
        <div class="brand-name">🎬 CineData</div>
        <h2 class="fw-bold mb-3">Αποσυνδεθήκατε με επιτυχία!</h2>
        <p class="text-white-50 mb-4">Ελπίζουμε να σας ξαναδούμε σύντομα για περισσότερες ταινίες και σειρές.</p>
    
        <div class="d-flex justify-content-center align-items-center">
    <a href="{% url 'login' %}" class="btn-blue">Σύνδεση ξανά</a>
    <a href="{% url 'catalog' %}" class="text-white-50 text-decoration-none small ms-3">← Επιστροφή στην Αρχική</a>
</div>
    </div>

</body>
</html>
