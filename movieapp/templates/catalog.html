<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineData - Κατάλογος</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #101010; color: white; font-family: 'Poppins', sans-serif; }
        .card { background-color: #1a1a1a; border: none; border-radius: 15px; overflow: hidden; transition: all 0.3s ease; max-width: 250px; margin: auto; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(255, 193, 7, 0.3); }
        .card-img-top { height: 360px; object-fit: cover; background-color: #222; }
        .card-body { padding: 1.25rem; text-align: center; }
        .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; color: #fff; }
        .movie-meta { font-size: 0.85rem; color: #aaa; margin-bottom: 1rem; }
        .rating-badge { background-color: rgba(255, 193, 7, 0.15); color: #ffc107; font-weight: 700; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; border: 1px solid rgba(255, 193, 7, 0.3); }
        .navbar { background-color: #000; border-bottom: 2px solid #ffc107; padding: 1rem 0; }
        .btn-details { background: linear-gradient(45deg, #ffc107, #ff9800); color: #000 !important; font-weight: 700; border: none; border-radius: 25px; text-transform: uppercase; font-size: 0.75rem; padding: 10px 20px; transition: 0.3s; text-decoration: none; display: block; }
        .btn-details:hover { background: linear-gradient(45deg, #ff9800, #ffc107); box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5 shadow-lg">
        <div class="container">
            <a class="navbar-brand text-warning fw-bold" href="#" style="font-size: 2rem;">🎬 CineData</a>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="text-center mb-5 fw-bold">🍿 Δημοφιλείς Ταινίες</h2>
        
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4">
            
            <div class="col">
                <div class="card h-100 shadow-lg">
                    <img src="https://m.media-amazon.com/images/M/MV5BNGEwYjgwOGQtYjg5ZS00Njc1LTk2ZGEtM2QwZWQ2NjdhZTE5XkEyXkFqcGc@._V1_.jpg" class="card-img-top" alt="The Godfather">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">The Godfather</h6>
                        <p class="movie-meta">Crime Drama | 1972</p>
                        <div class="mb-3"><span class="rating-badge">⭐ 4.9 / 5</span></div>
                        <div class="mt-auto"><a href="/details/" class="btn btn-details">ΛΕΠΤΟΜΕΡΕΙΕΣ</a></div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-lg">
                    <img src="https://m.media-amazon.com/images/M/MV5BMTA1NDQ3NTcyOTNeQTJeQWpwZ15BbWU3MDA0MzA4MzE@._V1_.jpg" alt="Pride and Prejudice">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">Pride and Prejudice</h6>
                        <p class="movie-meta">Drama/Comedy | 2005</p>
                        <div class="mb-3"><span class="rating-badge">⭐ 4.1 / 5</span></div>
                        <div class="mt-auto"><a href="/details/" class="btn btn-details">ΛΕΠΤΟΜΕΡΕΙΕΣ</a></div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-lg">
                    <img src="https://m.media-amazon.com/images/M/MV5BZjdkOTU3MDktN2IxOS00OGEyLWFmMjktY2FiMmZkNWIyODZiXkEyXkFqcGdeQXVyMTMxODk2OTU@._V1_.jpg" class="card-img-top" alt="Interstellar">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">Interstellar</h6>
                        <p class="movie-meta">Adventure | 2014</p>
                        <div class="mb-3"><span class="rating-badge">⭐ 3.7 / 5</span></div>
                        <div class="mt-auto"><a href="/details/" class="btn btn-details">ΛΕΠΤΟΜΕΡΕΙΕΣ</a></div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-lg">
                    <img src="https://upload.wikimedia.org/wikipedia/en/e/e1/Joker_%282019_film%29_poster.jpg" class="card-img-top" alt="Joker">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">Joker</h6>
                        <p class="movie-meta">Drama | 2019</p>
                        <div class="mb-3"><span class="rating-badge">⭐ 3.4 / 5</span></div>
                        <div class="mt-auto"><a href="/details/" class="btn btn-details">ΛΕΠΤΟΜΕΡΕΙΕΣ</a></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
