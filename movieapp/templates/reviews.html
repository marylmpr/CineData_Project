<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>CineData - Κριτικές</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #101010;
            color: white;
            margin: 0;
            padding: 0;
        }
.custom-input::placeholder {
    color: rgba(255, 255, 255, 0.7) !important; 
    font-weight: bold !important;
}

.custom-input::-webkit-input-placeholder {
    color: rgba(255, 255, 255, 0.7) !important;
    font-weight: bold !important;
}
        .custom-input {
            background-color: #2b2b2b !important;
            border: 1px solid #444 !important;
            color: white !important;
            font-weight: bold !important;
        }

        .custom-input:focus {
            border-color: #ffc107 !important;
            box-shadow: 0 0 8px rgba(255, 193, 7, 0.4) !important;
            color: white !important;
        }

        .review-card {
            background-color: #1e1e1e !important;
            border: 1px solid #333 !important;
            border-radius: 12px;
        }

        .navbar-brand {
            color: #ffc107 !important;
            font-weight: bold;
            font-size: 2rem;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark" style="background-color: #101010; border-bottom: 1px solid #222; padding: 1rem 0;">
        <div class="container">
            <a class="navbar-brand" href="/catalog/">🎬 CineData</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center mb-4" style="font-weight: bold;">Υποβολή Κριτικής</h2>

        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="card review-card p-4 mb-5 shadow-lg">
                    <h5 style="color: #ffc107; font-weight: bold; margin-bottom: 20px;">Νέα Κριτική</h5>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label style="color: #ffffff !important; font-weight: bold; display: block; margin-bottom: 8px;">Επιλογή Ταινίας</label>
                            <select class="form-select custom-input" name="review_movie" style="color: #ffffff !important; font-weight: bold !important;" required>
                                {% for movie in movies %}
                                    <option value="{{ movie.id }}">{{ movie.title }}</option>
                                {% empty %}
                                    <option value="">Δεν βρέθηκαν ταινίες στη βάση</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label style="color: #ffffff !important; font-weight: bold; display: block; margin-bottom: 8px;">Βαθμολογία</label>
                            <select class="form-select custom-input" name="review_rating" style="color: #ffffff !important; font-weight: bold !important;" required>
                                <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
                                <option value="4">⭐⭐⭐⭐ (4/5)</option>
                                <option value="3">⭐⭐⭐ (3/5)</option>
                                <option value="2">⭐⭐ (2/5)</option>
                                <option value="1">⭐ (1/5)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                             <label style="color: #ffffff !important; font-weight: bold; display: block; margin-bottom: 8px;">Σχόλιο</label>
                            <textarea class="form-control custom-input" name="review_comment" rows="4" placeholder="Γράψτε εδώ την κριτική σας..." style="color: #ffffff !important; font-weight: bold !important;" required></textarea>
                        </div>

                        <button type="submit" class="btn fw-bold w-100" style="background-color: #ffc107; color: black; padding: 12px; font-size: 1.1rem;">
                            Υποβολή Κριτικής
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
