<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineData - Σύνδεση</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #101010; color: white; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background-color: #1a1a1a; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid #333; }
        .brand-logo { color: #ffc107; font-weight: 700; font-size: 2rem; text-align: center; margin-bottom: 1.5rem; display: block; text-decoration: none; }
        .form-control { background-color: #252525; border: 1px solid #444; color: white; padding: 0.8rem; border-radius: 10px; }
        .form-control:focus { background-color: #2b2b2b; border-color: #ffc107; color: white; box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25); }
        .btn-login { background: linear-gradient(45deg, #ffc107, #ff9800); color: #000; font-weight: 700; border: none; border-radius: 10px; padding: 0.8rem; width: 100%; margin-top: 1.5rem; text-transform: uppercase; transition: 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4); color: #000; }
        .signup-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #888; }
        .signup-link a { color: #ffc107; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="#" class="brand-logo">🎬 CineData</a>
        <h4 class="text-center mb-4 fw-bold">Καλώς Ήρθατε! 🍿</h4>
        <form>
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">Όνομα Χρήστη</label>
                <input type="text" class="form-control" placeholder="Εισάγετε το username">
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">Κωδικός Πρόσβασης</label>
                <input type="password" class="form-control" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-login">ΣΥΝΔΕΣΗ</button>
        </form>
        <div class="signup-link">
            Δεν έχεις λογαριασμό; <a href="/signup/">Εγγραφή εδώ</a>
        </div>
    </div>
</body>
</html>
